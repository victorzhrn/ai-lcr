<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380"
     font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial,sans-serif"
     role="img" aria-label="ai-lcr routing: cheapest first, fallback on failure, recover after idle">
  <defs>
    <linearGradient id="rbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#11182f"/>
    </linearGradient>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f85149"/>
    </marker>
    <marker id="ay" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#e3b341"/>
    </marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <filter id="sf" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- background -->
  <rect x="0.5" y="0.5" width="899" height="379" rx="18" fill="url(#rbg)" stroke="#222b44"/>

  <!-- title -->
  <text x="40" y="44" fill="#e6edf3" font-size="20" font-weight="700">How routing works</text>
  <line x1="40" y1="56" x2="860" y2="56" stroke="#1e2740" stroke-width="1"/>

  <!-- ═══════════════════════ ROW 1: CHEAPEST FIRST ═══════════════════════ -->
  <text x="40" y="74" fill="#3fb950" font-size="10.5" font-weight="700" letter-spacing="0.8">① CHEAPEST FIRST</text>

  <!-- Call chip (x=40 y=80 w=128 h=44 → center 104,102) -->
  <rect x="40" y="80" width="128" height="44" rx="9" fill="#161d31" stroke="#2b3552"/>
  <text x="55" y="97" fill="#8b949e" font-size="10">your code</text>
  <text x="55" y="114" fill="#c9d1d9" font-size="11.5" font-weight="600">lcr("model")</text>

  <line x1="170" y1="102" x2="216" y2="102" stroke="#3fb950" stroke-width="1.8" marker-end="url(#ag)"/>

  <!-- Provider 1 cheapest (x=218 y=80 w=168 h=44 → center 302,102) -->
  <rect x="218" y="80" width="168" height="44" rx="9" fill="#0d1f14" stroke="#3fb950" stroke-width="1.6"/>
  <text x="234" y="97" fill="#3fb950" font-size="10" font-weight="600">⭐  cheapest first</text>
  <text x="234" y="114" fill="#e6edf3" font-size="12" font-weight="600">Kunavo</text>

  <line x1="388" y1="102" x2="432" y2="102" stroke="#3fb950" stroke-width="1.8" marker-end="url(#ag)"/>

  <!-- Response chip (x=434 y=80 w=120 h=44) -->
  <rect x="434" y="80" width="120" height="44" rx="9" fill="#0d1f14" stroke="#3fb950" stroke-width="1.4"/>
  <text x="450" y="97" fill="#3fb950" font-size="10">response</text>
  <text x="468" y="115" fill="#3fb950" font-size="16" font-weight="700">✓</text>

  <!-- Animated dot: happy path -->
  <circle r="4.5" fill="#3fb950" filter="url(#sf)">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M104,102 L216,102 L302,102 L432,102 L494,102"/>
  </circle>

  <!-- ═══════════════════════ ROW 2: FALLBACK ON FAILURE ═══════════════════════ -->
  <line x1="40" y1="134" x2="860" y2="134" stroke="#1e2740" stroke-width="0.6" stroke-dasharray="3,5"/>
  <text x="40" y="152" fill="#e3b341" font-size="10.5" font-weight="700" letter-spacing="0.8">② FALLBACK ON FAILURE</text>

  <!-- Call chip (x=40 y=158 w=128 h=44 → center 104,180) -->
  <rect x="40" y="158" width="128" height="44" rx="9" fill="#161d31" stroke="#2b3552"/>
  <text x="55" y="175" fill="#8b949e" font-size="10">your code</text>
  <text x="55" y="192" fill="#c9d1d9" font-size="11.5" font-weight="600">lcr("model")</text>

  <!-- Dashed arrow to failing provider -->
  <line x1="170" y1="180" x2="216" y2="180" stroke="#3a3f50" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#ar)"/>

  <!-- Provider 1 failing (x=218 y=158 w=168 h=44) -->
  <rect x="218" y="158" width="168" height="44" rx="9" fill="#1a0d0d" stroke="#f85149" stroke-width="1.5"/>
  <text x="234" y="175" fill="#f85149" font-size="10" font-weight="600">429 · 5xx · timeout</text>
  <text x="234" y="192" fill="#9e9e9e" font-size="12" font-weight="600">Provider 1  ✗</text>

  <!-- Fall-through arrow -->
  <line x1="388" y1="180" x2="432" y2="180" stroke="#e3b341" stroke-width="1.8" marker-end="url(#ay)"/>
  <text x="410" y="174" text-anchor="middle" fill="#e3b341" font-size="9.5">skip →</text>

  <!-- Provider 2 fallback (x=434 y=158 w=168 h=44) -->
  <rect x="434" y="158" width="168" height="44" rx="9" fill="#16140a" stroke="#e3b341" stroke-width="1.5"/>
  <text x="450" y="175" fill="#e3b341" font-size="10" font-weight="600">next in line</text>
  <text x="450" y="192" fill="#e6edf3" font-size="12" font-weight="600">Provider 2</text>

  <line x1="604" y1="180" x2="648" y2="180" stroke="#3fb950" stroke-width="1.8" marker-end="url(#ag)"/>

  <!-- Response chip (x=650 y=158 w=110 h=44) -->
  <rect x="650" y="158" width="110" height="44" rx="9" fill="#0d1f14" stroke="#3fb950" stroke-width="1.4"/>
  <text x="666" y="175" fill="#3fb950" font-size="10">response</text>
  <text x="683" y="193" fill="#3fb950" font-size="16" font-weight="700">✓</text>

  <text x="40" y="222" fill="#5b647d" font-size="10.5">streaming-safe · hard errors (400 · 401 · 403 · 422) pass through immediately without retrying</text>

  <!-- ═══════════════════════ ROW 3: RECOVER ═══════════════════════ -->
  <line x1="40" y1="234" x2="860" y2="234" stroke="#1e2740" stroke-width="0.6" stroke-dasharray="3,5"/>
  <text x="40" y="252" fill="#58a6ff" font-size="10.5" font-weight="700" letter-spacing="0.8">③ RECOVER</text>

  <!-- "Currently on Provider 2" chip (x=40 y=258 w=148 h=40 → center 114,278) -->
  <rect x="40" y="258" width="148" height="40" rx="9" fill="#101520" stroke="#2b3552"/>
  <text x="55" y="274" fill="#5b647d" font-size="10">currently routing via</text>
  <text x="55" y="289" fill="#c9d1d9" font-size="12" font-weight="600">Provider 2</text>

  <line x1="190" y1="278" x2="234" y2="278" stroke="#58a6ff" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#ab)"/>

  <!-- Idle timer chip (x=236 y=258 w=158 h=40) -->
  <rect x="236" y="258" width="158" height="40" rx="9" fill="#0d1420" stroke="#58a6ff" stroke-width="1.4"/>
  <text x="251" y="274" fill="#58a6ff" font-size="10">idle window expires</text>
  <text x="251" y="289" fill="#c9d1d9" font-size="12" font-weight="600">60s  (resetIntervalMs)</text>

  <line x1="396" y1="278" x2="440" y2="278" stroke="#3fb950" stroke-width="1.8" marker-end="url(#ag)"/>

  <!-- Snaps back chip (x=442 y=258 w=178 h=40) -->
  <rect x="442" y="258" width="178" height="40" rx="9" fill="#0d1f14" stroke="#3fb950" stroke-width="1.6"/>
  <text x="457" y="274" fill="#6e7891" font-size="10">snaps back to cheapest</text>
  <text x="457" y="289" fill="#3fb950" font-size="12" font-weight="600">⭐  Provider 1  restored</text>

  <text x="632" y="282" fill="#5b647d" font-size="11">— cost at minimum again</text>

  <!-- footer -->
  <text x="40" y="352" fill="#4a5568" font-size="10.5">no manual intervention needed · works with any OpenAI-compatible endpoint · streaming-safe throughout</text>
</svg>
